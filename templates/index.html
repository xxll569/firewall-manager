<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>防火墙管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav class="navbar px-4 py-2">
  <div class="d-flex align-items-center gap-3">
    <div class="nav-icon"><i class="bi bi-shield-shaded"></i></div>
    <div>
      <div class="nav-title">防火墙管理</div>
      <div class="nav-sub">macOS pf · anchor: fw-manager</div>
    </div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span id="pfBadge" class="status-badge"></span>
    <button class="btn btn-sm btn-icon" onclick="refreshAll()" title="刷新">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>
</nav>

<!-- ── Main layout ─────────────────────────────────────────────── -->
<div class="page-wrap">

  <!-- Alert area -->
  <div id="alertArea" class="mb-3"></div>

  <!-- Top row: status card + quick open card -->
  <div class="row g-3 mb-3">

    <!-- pf Status card -->
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header-custom">
          <i class="bi bi-activity me-2"></i>防火墙状态
        </div>
        <div class="card-body-custom">
          <div class="status-big" id="statusBig">
            <div class="status-dot" id="statusDot"></div>
            <div>
              <div class="status-label" id="statusLabel">检测中…</div>
              <div class="status-hint text-muted small">pf 包过滤防火墙</div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-success btn-sm flex-fill" onclick="togglePf('enable')">
              <i class="bi bi-play-fill me-1"></i>启用
            </button>
            <button class="btn btn-outline-danger btn-sm flex-fill" onclick="togglePf('disable')">
              <i class="bi bi-stop-fill me-1"></i>禁用
            </button>
          </div>
          <div class="mt-3">
            <div class="info-row"><span class="info-key">Anchor 文件</span><code class="info-val">/etc/pf.anchors/fw-manager</code></div>
            <div class="info-row"><span class="info-key">主配置</span><code class="info-val">/etc/pf.conf</code></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick open card -->
    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-header-custom">
          <i class="bi bi-lightning-fill me-2"></i>快速开放常用端口
        </div>
        <div class="card-body-custom">
          <div class="preset-grid" id="presetGrid">
            <!-- filled by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add rule + rules list row -->
  <div class="row g-3">

    <!-- Add rule form -->
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header-custom">
          <i class="bi bi-shield-plus me-2"></i>自定义规则
        </div>
        <div class="card-body-custom">
          <div class="mb-3">
            <label class="form-label-custom">端口号</label>
            <input type="number" class="form-control form-control-custom" id="addPort"
                   placeholder="1 – 65535" min="1" max="65535"/>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label-custom">协议</label>
              <select class="form-select form-select-custom" id="addProtocol">
                <option value="tcp">TCP</option>
                <option value="udp">UDP</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label-custom">方向</label>
              <select class="form-select form-select-custom" id="addDirection">
                <option value="in">入站 in</option>
                <option value="out">出站 out</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label-custom">来源 IP（留空=任意）</label>
            <input type="text" class="form-control form-control-custom" id="addSource"
                   placeholder="any / 192.168.1.0/24"/>
          </div>
          <button class="btn btn-primary w-100" onclick="addRule()">
            <i class="bi bi-plus-lg me-1"></i>添加规则
          </button>
        </div>
      </div>
    </div>

    <!-- Rules list -->
    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-header-custom d-flex justify-content-between align-items-center">
          <span><i class="bi bi-list-ul me-2"></i>当前规则
            <span class="badge-count ms-2" id="ruleCount">0</span>
          </span>
          <button class="btn btn-sm btn-icon" onclick="loadRules()" title="刷新">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
        <div class="card-body-custom p-0">
          <div id="rulesList" class="rules-list">
            <div class="empty-state">
              <i class="bi bi-shield-slash"></i>
              <p>暂无规则，点击"刷新"或添加规则</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Raw output collapsible -->
  <div class="mt-3">
    <button class="btn btn-sm btn-outline-secondary" type="button"
            data-bs-toggle="collapse" data-bs-target="#rawOutput">
      <i class="bi bi-terminal me-1"></i>查看原始 pf 信息
    </button>
    <div class="collapse mt-2" id="rawOutput">
      <div class="card">
        <div class="card-body-custom p-0">
          <pre id="rawText" class="raw-pre">点击上方按钮加载…</pre>
        </div>
      </div>
    </div>
  </div>

</div><!-- page-wrap -->

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="mainToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content modal-dark">
      <div class="modal-body text-center py-4">
        <div class="modal-icon mb-3"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <p id="confirmBody" class="mb-0"></p>
      </div>
      <div class="modal-footer justify-content-center border-0 pt-0">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-sm btn-danger" id="confirmOkBtn">确定删除</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
